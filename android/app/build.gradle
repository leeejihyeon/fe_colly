import java.util.Properties

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def localAuthProperties = new Properties()
def localAuthPropertiesFile = rootProject.file('colly.auth.local.properties')
if (localAuthPropertiesFile.exists()) {
    localAuthPropertiesFile.withInputStream { inputStream ->
        localAuthProperties.load(inputStream)
    }
}

def resolveAuthValue = { String key, String defaultValue ->
    def projectValue = project.findProperty(key)
    if (projectValue != null && !projectValue.toString().trim().isEmpty()) {
        return projectValue.toString().trim()
    }

    def localValue = localAuthProperties.getProperty(key)
    if (localValue != null && !localValue.trim().isEmpty()) {
        return localValue.trim()
    }

    def envValue = System.getenv(key)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue.trim()
    }

    return defaultValue
}

def toBuildConfigString = { String value ->
    '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"'
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.collyapp"
    defaultConfig {
        applicationId "com.collyapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "COLLY_APP_ENV", toBuildConfigString(resolveAuthValue("COLLY_APP_ENV", "dev"))
        buildConfigField "String", "COLLY_API_BASE_URL", toBuildConfigString(resolveAuthValue("COLLY_API_BASE_URL", "http://10.0.2.2:18080"))
        buildConfigField "String", "COLLY_GOOGLE_WEB_CLIENT_ID", toBuildConfigString(resolveAuthValue("COLLY_GOOGLE_WEB_CLIENT_ID", ""))
        buildConfigField "String", "COLLY_GOOGLE_IOS_CLIENT_ID", toBuildConfigString(resolveAuthValue("COLLY_GOOGLE_IOS_CLIENT_ID", ""))
        manifestPlaceholders = [
            usesCleartextTraffic: resolveAuthValue("COLLY_ANDROID_USES_CLEARTEXT_TRAFFIC", "true"),
        ]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
